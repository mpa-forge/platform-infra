name: platform-blueprint-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: platform-blueprint-local-postgres
    environment:
      POSTGRES_DB: platform_blueprint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform_blueprint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend-api:
    profiles: ["frontend-support"]
    build:
      context: ../../backend-api
    container_name: platform-blueprint-local-backend-api
    environment:
      APP_ENV: local
      LOG_LEVEL: debug
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/platform_blueprint?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-web:
    profiles: ["api-support"]
    build:
      context: ../../frontend-web
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_APP_ENV: local
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_replace_me
        VITE_CLERK_SIGN_IN_URL: /sign-in
        VITE_CLERK_SIGN_UP_URL: /sign-up
    container_name: platform-blueprint-local-frontend-web
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -qx ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
